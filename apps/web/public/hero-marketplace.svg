  </defs>
  <rect width="800" height="1000" fill="url(#sky)"/>
  <circle cx="650" cy="180" r="120" fill="rgba(255,255,255,0.1)"/>
  <circle cx="120" cy="820" r="90" fill="rgba(255,255,255,0.06)"/>
  <circle cx="400" cy="500" r="200" fill="rgba(167,139,250,0.15)"/>

