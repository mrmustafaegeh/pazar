apiVersion: apps/v1
kind: Deployment
metadata:
  name: pazaryeri-api
  labels:
    app: pazaryeri-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pazaryeri-api
  template:
    metadata:
      labels:
        app: pazaryeri-api
    spec:
      containers:
        - name: api
          image: pazaryeri/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: pazaryeri-api-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pazaryeri-api
spec:
  selector:
    app: pazaryeri-api
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pazaryeri-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pazaryeri-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
