# Nginx reverse proxy — use only if not fully fronted by Cloudflare.
# Phase 6: TLS termination, rate limiting at edge.

upstream api {
    server api:4000;
}

upstream web {
    server web:3000;
}

upstream admin {
    server admin:3001;
}

server {
    listen 80;
    server_name pazaryeri.example.com;

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }
}

server {
    listen 80;
    server_name admin.pazaryeri.example.com;

    location / {
        proxy_pass http://admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }
}

server {
    listen 80;
    server_name api.pazaryeri.example.com;

    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }
}
